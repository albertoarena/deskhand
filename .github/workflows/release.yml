name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and attach PHAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2, box
          ini-values: phar.readonly=0

      - name: Install runtime dependencies
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: Build the PHAR
        run: box compile

      - name: Verify the PHAR runs
        run: php build/deskhand.phar --version

      - name: Extract release notes from the changelog
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v ver="$version" '
            /^\[[^]]+\]: / { if (capture) exit }
            /^## / {
              if (capture) exit
              if ($0 ~ "^## \\[" ver "\\]") { capture = 1; next }
            }
            capture { print }
          ' CHANGELOG.md)
          {
            echo "body<<__NOTES__"
            echo "$notes"
            echo "__NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Attach the PHAR to the release
        uses: softprops/action-gh-release@v2
        with:
          files: build/deskhand.phar
          body: ${{ steps.notes.outputs.body }}
